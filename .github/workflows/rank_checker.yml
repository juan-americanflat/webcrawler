name: Weekly SEO Rank Checker

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 8am EST (1pm UTC)
  workflow_dispatch:        # Allow manual runs from GitHub Actions tab

jobs:
  check-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Run rank checker
        env:
          VALUESERP_KEY: ${{ secrets.VALUESERP_KEY }}
        run: python rank_checker.py --keywords keywords.csv --output results_latest.csv

      - name: Upload results to Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python sheets_writer.py --input results_latest.csv

      - name: Commit results CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results_latest.csv
          git diff --staged --quiet || git commit -m "Weekly rank results $(date +'%Y-%m-%d')"
          git push
