name: SEO Rank Checker

# Tiered cron schedule — keeps us under the SERP plan's 10k searches/month
# budget while running high-priority keywords daily for fast signal on
# revenue-driving terms. With 147 high / 179 medium / 33 low keywords:
#
#   high   daily  →    147 × 30   ≈ 4,410 / month
#   medium 3×/wk  →    179 × 13   ≈ 2,327 / month
#   low    weekly →     33 × 4.33 ≈   143 / month
#   total                          ≈ 6,880 / month  (≈ 69 % of plan,
#                                                    leaves ~3,100 buffer
#                                                    for manual reruns
#                                                    and new keywords)
#
# Cron times are staggered by minute so `github.event.schedule` is
# unambiguous on Monday (when all three crons fire) and the runs queue
# instead of racing on `git push` (see `concurrency:` below).

on:
  schedule:
    # High priority — every day at 13:00 UTC (8 AM EST / 9 AM EDT)
    - cron: "0 13 * * *"
    # Medium priority — Mon / Wed / Fri at 13:15 UTC
    - cron: "15 13 * * 1,3,5"
    # Low priority — Mondays at 13:30 UTC
    - cron: "30 13 * * 1"
  workflow_dispatch:
    inputs:
      priority:
        description: "Priority tier to check (manual run)"
        type: choice
        options:
          - all
          - high
          - medium
          - low
        default: all

# Serialise all runs of this workflow. On Mondays all three crons fire
# within 30 minutes; without this they'd race on `git push origin main`
# and the later runs would fail. Queue them instead.
concurrency:
  group: rank-checker
  cancel-in-progress: false

jobs:
  check-rankings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine priority tier
        id: tier
        # Manual dispatches pass `inputs.priority` explicitly. Scheduled
        # runs detect the tier from the cron expression that fired —
        # `github.event.schedule` contains the exact string from the
        # cron: list above. Falling through to "all" is defensive: if
        # someone edits the cron entries above without updating this
        # case, the run still does something useful.
        run: |
          if [ -n "${{ inputs.priority }}" ]; then
            PRIORITY="${{ inputs.priority }}"
            SOURCE="manual"
          else
            case "${{ github.event.schedule }}" in
              "0 13 * * *")       PRIORITY="high";   SOURCE="cron-daily"   ;;
              "15 13 * * 1,3,5")  PRIORITY="medium"; SOURCE="cron-mwf"     ;;
              "30 13 * * 1")      PRIORITY="low";    SOURCE="cron-weekly"  ;;
              *)                  PRIORITY="all";    SOURCE="cron-unknown" ;;
            esac
          fi
          echo "priority=${PRIORITY}" >> "$GITHUB_OUTPUT"
          echo "source=${SOURCE}"     >> "$GITHUB_OUTPUT"
          echo "::notice title=Tier::Running priority=${PRIORITY} (${SOURCE})"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests gspread google-auth python-dotenv

      - name: Run rank checker (tier=${{ steps.tier.outputs.priority }})
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: |
          python rank_checker.py \
            --keywords keywords.csv \
            --output tier_results.csv \
            --priority "${{ steps.tier.outputs.priority }}"

      - name: Merge, commit, push (retry-on-race)
        # The merge + commit + push are combined into a single retry
        # loop because `concurrency: rank-checker` at the workflow
        # level has occasionally let two tier runs check out the same
        # head SHA and race on `git push` (observed 2026-05-29: the
        # high+medium runs both checked out 6a8be34e, high pushed
        # 4f40bd20, medium then failed). On rejection we hard-reset to
        # the latest main, RE-RUN the merge against that fresh state
        # (which now includes the other tier's commit), and try the
        # push again.
        #
        # tier_results.csv is untracked, so `git reset --hard` keeps
        # it across iterations. results_latest.csv and the dated
        # snapshot get re-derived from scratch each attempt against
        # whatever just landed on origin/main — this is correct
        # because the merge logic is idempotent: upserting our tier
        # rows on top of any prior state always produces the same
        # final tier-rows-in-place result.
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          DATE=$(date -u +"%Y-%m-%d")
          TIER="${{ steps.tier.outputs.priority }}"

          for attempt in 1 2 3 4 5; do
            echo "::group::Attempt $attempt"

            # 1. Sync working tree to latest main (discards any prior
            #    commit attempt from a previous failed iteration).
            git fetch origin main
            git reset --hard origin/main

            # 2. Re-run the merge against the freshly-pulled state.
            python - <<'PY'
          import csv
          from datetime import datetime, timezone
          from pathlib import Path

          tier_file = Path("tier_results.csv")
          latest    = Path("results_latest.csv")
          history   = Path("results_history")
          history.mkdir(exist_ok=True)
          snapshot  = history / f"results_{datetime.now(timezone.utc):%Y-%m-%d}.csv"

          tier_rows = list(csv.DictReader(open(tier_file)))
          if not tier_rows:
              print("No tier results to merge; exiting cleanly.")
              raise SystemExit(0)

          # ── Safeguard against a dead API key (e.g. ValueSerp 402
          # Payment Required when credits run out). An errored row has a
          # non-empty `error` column; a legitimately-unranked keyword has
          # an EMPTY error with a blank position. That distinction lets us
          # cleanly separate "the API broke" from "we just don't rank for
          # this term". Two protections:
          #   (a) Never merge errored rows. Otherwise a dead key
          #       overwrites good positions with blanks — the silent
          #       "everything shows Not ranked" failure we hit on
          #       2026-06-19..24.
          #   (b) If the WHOLE run errored, fail the Action loudly (red X
          #       in the Actions tab) instead of committing a blank
          #       snapshot, so the next credit exhaustion is impossible to
          #       miss while auto-top-up stays off.
          valid   = [r for r in tier_rows if not (r.get("error") or "").strip()]
          errored = [r for r in tier_rows if (r.get("error") or "").strip()]
          err_rate = len(errored) / len(tier_rows)
          print(f"tier run: {len(valid)} ok, {len(errored)} errored "
                f"({err_rate:.0%} error rate)")

          if not valid:
              sample = (errored[0].get("error") or "")[:160] if errored else "unknown"
              print("::error title=Rank checker run failed::"
                    f"0/{len(tier_rows)} keywords returned data — not "
                    f"committing a blank snapshot. First error: {sample}")
              print("Check the ValueSerp balance: "
                    "https://api.valueserp.com/account?api_key=...")
              raise SystemExit(1)

          if err_rate >= 0.25:
              print("::warning title=Partial rank checker failure::"
                    f"{len(errored)}/{len(tier_rows)} keywords errored. "
                    "Committing only the rows that succeeded — check "
                    "ValueSerp credits soon.")

          # From here only VALID rows are merged. Errored keywords keep
          # their last-known-good values in results_latest.csv and
          # contribute no misleading null point to today's snapshot.
          #
          # Upsert into results_latest.csv. We always start from the
          # on-disk file (which after `reset --hard` is the latest from
          # origin/main, possibly including a sibling tier's commit), so
          # this naturally composes.
          existing = list(csv.DictReader(open(latest))) if latest.exists() else []
          by_kw = {r["keyword"]: r for r in existing}
          for r in valid:
              by_kw[r["keyword"]] = r

          # Preserve keywords.csv ordering for the Streamlit table.
          kw_order = [r["keyword"].strip() for r in csv.DictReader(open("keywords.csv"))]
          ordered  = [by_kw[k] for k in kw_order if k in by_kw]
          for k, r in by_kw.items():
              if k not in kw_order:
                  ordered.append(r)

          fieldnames = list(ordered[0].keys())
          with open(latest, "w", newline="") as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(ordered)
          print(f"results_latest.csv: merged {len(valid)} valid rows "
                f"(total {len(ordered)} rows in file)")

          # Merge valid rows into today's snapshot — also against the
          # just-pulled state, so a sibling tier's contribution to
          # today's file is preserved.
          snap_existing = list(csv.DictReader(open(snapshot))) if snapshot.exists() else []
          snap_by_kw    = {r["keyword"]: r for r in snap_existing}
          for r in valid:
              snap_by_kw[r["keyword"]] = r
          snap_out = list(snap_by_kw.values())
          with open(snapshot, "w", newline="") as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(snap_out)
          print(f"{snapshot}: {len(snap_out)} rows "
                f"(added {len(valid)} valid from this tier)")
          PY

            # 3. Stage. If nothing changed (the snapshot is identical
            #    to what's on main — happens when retrying after a
            #    failed push that nevertheless committed the same data),
            #    bail successfully.
            git add results_latest.csv results_history/
            if git diff --staged --quiet; then
              echo "No changes to commit on attempt $attempt; main is already up to date."
              echo "::endgroup::"
              exit 0
            fi

            git commit -m "chore: update SEO rankings (${TIER}) ${DATE} [skip ci]"

            # 4. Push. If accepted, we're done.
            if git push origin main; then
              echo "Push succeeded on attempt $attempt."
              echo "::endgroup::"
              # Clean up the intermediate before exiting the step.
              rm -f tier_results.csv
              exit 0
            fi

            echo "::endgroup::"
            backoff=$((attempt * 5))
            echo "::warning::Push rejected on attempt $attempt — sleeping ${backoff}s before retry"
            sleep "$backoff"
          done

          echo "::error::Push still failing after 5 attempts. Manual intervention required."
          exit 1
